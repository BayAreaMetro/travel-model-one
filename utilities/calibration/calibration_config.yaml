general:
  # Root of the model run being calibrated. Used to:
  #   - locate input files via {target_dir} substitution in submodel configs
  #   - set the output directory: {target_dir}/Output_{calib_iter}/calibration/
  target_dir: "M:/Development/Travel Model One/Calibration/Version 1.7/2023_TM170_IPA_00_Cube6"
  calib_iter: "06"
  iter: "1"
  # Root directory for calibration Excel workbooks (model run mode).
  # Each submodel's workbook is saved under:
  #   {workbook_base_path}/{submodel} {name}/{workbook_template}.xlsx
  #   {workbook_base_path}/{submodel} {name}/{workbook_template}_{calib_iter}.xlsx
  workbook_base_path: "M:/Development/Travel Model One/Calibration/Version 1.7"

data_sources:
  taz_data: "{target_dir}/INPUT/landuse/tazData.csv"
  dist_skim: "{target_dir}/OUTPUT_00/skims/nonmotskm.csv"

calibration_01:
  name: Usual Work and School Location
  workbook_template: 01_UsualWorkAndSchoolLocation_2023
  input_file: "{target_dir}/OUTPUT_{calib_iter}/main/wsLocResults_{iter}.csv"
  uec_src_file: "{target_dir}/OUTPUT_{calib_iter}/UEC/DestinationChoice.xls"
  bats_data: false
  bats_person_data: ""  # path to PersonData.csv with person_weight column for BATS survey mode

calibration_02:
  name: Automobile Ownership
  workbook_template: 02_AutoOwnership_2023
  input_file: "{target_dir}/INPUT/popsyn/hhFile.2023_v12.csv"
  uec_src_file: "{target_dir}/OUTPUT_{calib_iter}/UEC/AutoOwnership.xls"
  ao_results: "{target_dir}/OUTPUT_{calib_iter}/main/aoResults.csv"

calibration_04:
  name: Coordinated Daily Activity Pattern
  workbook_template: 04_CoordinatedDailyActivityPattern_2023
  input_file: "{target_dir}/OUTPUT_{calib_iter}/main/cdapResults.csv"
  uec_src_file: "{target_dir}/OUTPUT_{calib_iter}/UEC/CoordinatedDailyActivityPattern.xls"
  bats_data: false

