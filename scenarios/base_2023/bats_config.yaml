# Processing Pipeline Configuration for BATS 2023
# This config file demonstrates the full pipeline with DaySim and CTRAMP formatting

# config.yaml

# Define directory shorthands
survey_dir: "//models.ad.mtc.ca.gov/data/models/Data/HomeInterview/Bay Area Travel Study 2023/Data/Full Weighted 2023 Dataset/WeightedDataset_02212025"
weights_dir: "//model3-a/Model3A-Share/survey_repos/ProjRoot_Mon-Thu20251201/WgtRoot_Mon-Thu20251201_nocommutemode/output/"
pums_dir: "//models.ad.mtc.ca.gov/data/models/Data/Census/PUMS/2023_1yr"
output_dir: "E:/tm1a_test/survey"
TM1_shapefile_dir: "E:/GitHub/travel-model-one/utilities/geographies"
TM2_shapefile_dir: "E:/GitHub/TM2/tm2py-utils/tm2py_utils/inputs/maz_taz/shapefiles"
log_file: "{{ output_dir }}/pipeline_2023.log" # If not set, logs just to console, if not absolute saves to .cache directory

# Pipeline configuration
steps:
  - name: load_data
    validate_input: false # This will override @step(validate=True/False) in the function definition
    cache: false
    params:
      input_paths:
        households: "{{ survey_dir }}/hh.csv"
        persons: "{{ survey_dir }}/person.csv"
        days: "{{ survey_dir }}/day.csv"
        unlinked_trips: "{{ survey_dir }}/trip.csv"

  - name: clean_2023_bats
    validate_input: false
    cache: false

  - name: imputation
    validate_input: false
    cache: false
    params:
      impute_columns:
        # KNN/RF: impute single columns using similar records
        # RF tends to be better for categoricals, thus tends to be faster/better in this context.
        # KNN/MICE tend to be better for numeric columns, but RF can still work well if you have good predictive features.
        households:
          - column: income_bin
            method: rf
            missing_values: [MISSING, PNTA]
            categorical_features: [residence_type, residence_rent_own]
            aggregate_from:
              persons:
                pivot_count: [employment, education, student, occupation, industry]

        persons:
          - column: gender
            method: rf
            missing_values: [TRANS, NON_BINARY, MISSING, OTHER, PNTA]  # Must conform to M/F for weighting (ACS only includes male/female, so the weighting approachreflects this constraint)
            join_tables: [households]
            # numeric_features: [age] # Optional if you have them.
            numeric_features: [num_trips]
            categorical_features: [age, relationship, employment, occupation, education, industry, student, can_drive, work_mode, income_bin, residence_type, residence_rent_own]

          - method: rf
            column: race
            missing_values: [MISSING, PNTA]
            join_tables: [households]
            # numeric_features: [num_trips]
            categorical_features: [age, relationship, employment, occupation, education, industry, student, can_drive, work_mode, income_bin, residence_type, residence_rent_own]

          - method: rf
            column: ethnicity
            missing_values: [MISSING, PNTA]
            join_tables: [households]
            # numeric_features: [num_trips]
            categorical_features: [age, relationship, employment, occupation, education, industry, student, can_drive, work_mode, income_bin, residence_type, residence_rent_own]

          # # MICE: impute correlated column groups together
          # - method: mice
          #   columns: [race, ethnicity]
          #   missing_values:
          #     race: [MISSING, PNTA]
          #     ethnicity: [MISSING, PNTA]
          #   join_tables: [households]
          #   numeric_features: [num_trips]
          #   categorical_features: [age, relationship, employment, occupation, education, industry, student, can_drive, work_mode, income_bin, residence_type, residence_rent_own]
          #   max_iter: 10

      # Optional: create diagnostic flags (default: true)
      create_flags: true
      random_state: 42     # For reproducibility

      # Optional: k-fold validation to assess quality
      validate_imputation:
        enabled: true
        n_folds: 5           # Number of cross-validation folds
        sample_pct: 5.0      # % of non-missing values to test
        output_path: "{{ output_dir }}/imputation_validation.csv"
        # Optional: benchmark every column against all three methods
        compare_methods: false

  - name: link_trips
    validate_input: false
    cache: false
    params:
      change_mode_enum: CHANGE_MODE
      transit_mode_enums: [FERRY, TRANSIT, LONG_DISTANCE]
      max_dwell_time: 180  # in minutes
      dwell_buffer_distance: 100  # in meters

  - name: detect_joint_trips
    validate_input: false
    cache: false
    params:
      config:
        method: "mahalanobis"
        # Covariance for Mahalanobis distance calculation
        # Think of this as the standard deviation of measurement noise in each dimension
        # Diagonal: [origin_var_m^2, dest_var_m^2, depart_var_min^2, arrive_var_min^2]
        # Default [10000, 10000, 100, 100] = 100m, 100m, 10min, 10min std devs
        covariance: [10000, 10000, 100, 100]
        # Confidence level: Higher = stricter matching (fewer detections)
        # 0.90 = 90% confidence (strict), 0.75 = moderate, 0.50 = permissive
        confidence_level: 0.90

        # Alternative: simpler buffer method with time/space thresholds
        # method: "buffer"
        # time_threshold_minutes: 15.0
        # space_threshold_meters: 100.0

  - name: extract_tours
    validate_input: false
    cache: false

