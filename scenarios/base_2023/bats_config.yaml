  # -- Existing weights (alternative to computing new weights) ----------
  # Uncomment this block and comment out the 'weighting' step above
  # to use pre-computed weights from an external source.
  - name: add_existing_weights
    validate_input: false
    cache: false
    params:
      derive_missing_weights: true
      weights:
        household_weights:
          weight_path: "{{ weights_dir }}/hh_weights.csv"
        person_weights:
          weight_path: "{{ weights_dir }}/person_weights.csv"
        day_weights:
          weight_path: "{{ weights_dir }}/day_weights.csv"
        unlinked_trip_weights:
          weight_id_col: "trip_id"  # Weight file uses 'trip_id' instead of canonical 'unlinked_trip_id'
          weight_col: "trip_weight"  # Weight file uses 'trip_weight' instead of canonical 'unlinked_trip_weight'
          weight_path: "{{ weights_dir }}/trip_weights.csv"
          keep_name: false # Defaults to false, but you could keep original name if desired

  - name: add_zone_ids
    validate_input: false
    cache: false
    params:
      zone_geographies:
        # - zone_name: "taz"  # Primary TAZ for DaySim (TM1)
        #   shapefile: "{{ TM2_shapefile_dir }}/tazs_TM2_2_5.shp"
        #   zone_id_field: "TAZ_NODE"
        # - zone_name: "maz"  # Primary MAZ for DaySim (TM2)
