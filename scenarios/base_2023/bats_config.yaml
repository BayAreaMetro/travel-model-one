      # This is useful to generate Tableau aliases and for summarization code.
      enum_codebook_path: "{{ output_dir }}/survey/codebook.xlsx"
      output_paths:
        # Standard Survey Formats
        households: "{{ output_dir }}/survey/households_2023.csv"
        persons: "{{ output_dir }}/survey/persons_2023.csv"
        days: "{{ output_dir }}/survey/days_2023.csv"
        unlinked_trips: "{{ output_dir }}/survey/unlinked_trips_2023.csv"
        linked_trips: "{{ output_dir }}/survey/linked_trips_2023.csv"
        tours: "{{ output_dir }}/survey/tours_2023.csv"
        joint_trips: "{{ output_dir }}/survey/joint_trips_2023.csv"

        # # DaySim Formats
        # households_daysim: "{{ output_dir }}/daysim_2023/households.csv"
        # persons_daysim: "{{ output_dir }}/daysim_2023/persons.csv"
        # days_daysim: "{{ output_dir }}/daysim_2023/days.csv"
        # linked_trips_daysim: "{{ output_dir }}/daysim_2023/linked_trips.csv"
        # tours_daysim: "{{ output_dir }}/daysim_2023/tours.csv"

        # CTRAMP Formats
        households_ctramp: "{{ output_dir }}/ctramp_2023/HouseholdData.csv"
        persons_ctramp: "{{ output_dir }}/ctramp_2023/PersonData.csv"
        mandatory_locations_ctramp: "{{ output_dir }}/ctramp_2023/MandatoryLocationData.csv"
        cdap_results_ctramp: "{{ output_dir }}/ctramp_2023/cdapResults.csv"
        individual_tours_ctramp: "{{ output_dir }}/ctramp_2023/IndivTourData.csv"
        individual_trips_ctramp: "{{ output_dir }}/ctramp_2023/IndivTripData.csv"
        joint_tours_ctramp: "{{ output_dir }}/ctramp_2023/JointTourData.csv"
        joint_trips_ctramp: "{{ output_dir }}/ctramp_2023/JointTripData.csv"
